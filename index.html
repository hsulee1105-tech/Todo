<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Mobile Todo</title>
  <style>
    /* 1. 디자인 (CSS) */
    :root { --primary: #6c5ce7; --bg: #f8f9fa; }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body { 
      margin: 0; padding: 0; font-family: -apple-system, sans-serif; 
      background: var(--bg); display: flex; justify-content: center;
      height: 100vh; overflow: hidden; /* 바닥 스크롤 방지 */
    }

    .todo-app {
      width: 100%; max-width: 450px; background: white;
      height: 100%; display: flex; flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }

    /* 헤더 영역: 제목과 날짜를 조화롭게 배치 */
    header { 
      padding: 20px 20px 10px 20px;
      background: #fff;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    header h2 { color: var(--primary); margin: 0; font-size: 1.3rem; }
    
    /* 날짜 선택기: 잘리지 않도록 너비 조절 및 스타일 개선 */
    #date-picker {
      padding: 8px 10px; border-radius: 8px;
      border: 1px solid #dfe6e9; font-size: 0.9rem;
      background: #f9f9f9; cursor: pointer;
    }

    /* 입력 영역 */
    .input-section { 
      padding: 15px 20px;
      display: flex; gap: 8px; flex-shrink: 0;
      background: #fff;
    }
    
    #todo-input {
      flex: 1; padding: 12px; border: 1px solid #ddd;
      border-radius: 10px; font-size: 16px; /* 16px 미만은 아이폰에서 자동 줌 발생 */
    }

    #add-btn {
      padding: 0 18px; background: var(--primary); color: white;
      border: none; border-radius: 10px; font-weight: bold;
      box-shadow: 0 2px 5px rgba(108, 92, 231, 0.3);
    }

    /* 리스트 영역: 스크롤 최적화 */
    #todo-list {
      list-style: none; padding: 0 20px; margin: 0;
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
      padding-bottom: 30px; /* 맨 밑 항목 가려짐 방지 */
    }

    li {
      display: flex; align-items: center; padding: 14px;
      background: #f8f9fd; border-radius: 12px; margin-bottom: 10px;
      flex-shrink: 0; border: 1px solid #f1f2f6;
    }

    li.completed { order: 1; opacity: 0.5; background: #f1f2f6; border: none; }
    li.completed span { text-decoration: line-through; color: #a4b0be; }

    .check-box {
      width: 24px; height: 24px; border: 2px solid var(--primary);
      border-radius: 50%; margin-right: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    li.completed .check-box { background: var(--primary); }
    li.completed .check-box::after { content: '✔'; color: white; font-size: 12px; }

    li span { flex: 1; font-size: 1rem; color: #2d3436; word-break: break-all; }
    
    .del-btn { color: #ff7675; border: none; background: none; padding: 5px; font-size: 0.8rem; }

    /* 스크롤바 깔끔하게 */
    #todo-list::-webkit-scrollbar { width: 4px; }
    #todo-list::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
  </style>
</head>
<body>

<div class="todo-app">
  <header>
    <div class="header-top">
      <h2>📅 My Todo</h2>
      <input type="date" id="date-picker">
    </div>
  </header>
  
  <form id="todo-form" class="input-section">
    <input type="text" id="todo-input" placeholder="오늘 뭐 할까요?" required>
    <button type="submit" id="add-btn">추가</button>
  </form>

  <ul id="todo-list"></ul>
</div>

<script>
  const todoForm = document.getElementById('todo-form');
  const input = document.getElementById('todo-input');
  const todoList = document.getElementById('todo-list');
  const datePicker = document.getElementById('date-picker');

  // 한국 시간 기준 날짜 설정
  const now = new Date();
  const offset = now.getTimezoneOffset() * 60000;
  const today = new Date(now.getTime() - offset).toISOString().split('T')[0];
  datePicker.value = today;

  let allTodos = JSON.parse(localStorage.getItem('myArchive')) || [];

  function render() {
    todoList.innerHTML = '';
    const selectedDate = datePicker.value;
    const filtered = allTodos.filter(t => t.date === selectedDate);
    
    // 미완료 항목은 최신순, 완료 항목은 아래로
    filtered.sort((a, b) => a.completed - b.completed);

    filtered.forEach(todo => {
      const li = document.createElement('li');
      if (todo.completed) li.classList.add('completed');
      li.innerHTML = `
        <div class="check-box"></div>
        <span>${todo.text}</span>
        <button type="button" class="del-btn">삭제</button>
      `;
      li.querySelector('.check-box').onclick = () => { todo.completed = !todo.completed; save(); };
      li.querySelector('.del-btn').onclick = () => { 
        if(confirm('삭제하시겠습니까?')) {
          allTodos = allTodos.filter(t => t !== todo); 
          save(); 
        }
      };
      todoList.appendChild(li);
    });
  }

  function save() {
    localStorage.setItem('myArchive', JSON.stringify(allTodos));
    render();
  }

  todoForm.onsubmit = function(e) {
    e.preventDefault();
    const val = input.value.trim();
    if (!val) return false;
    // 새 항목을 배열 맨 앞에 추가해서 리스트 상단에 뜨게 함
    allTodos.unshift({ text: val, completed: false, date: datePicker.value });
    input.value = '';
    save();
    todoList.scrollTop = 0;
    return false;
  };

  datePicker.onchange = render;
  render();
</script>

</body>
</html>
